<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Skill Forge Dashboard</title>
<style>
  :root {
    --page:        #f9f9f7;
    --surface:     #fcfcfb;
    --ink:         #0b0b0b;
    --ink-2:       #52514e;
    --muted:       #898781;
    --hairline:    #e1e0d9;
    --border:      rgba(11,11,11,0.10);
    --accent:      #2a78d6;
    --good:        #0ca30c;
    --warning:     #fab219;
    --serious:     #ec835a;
    --critical:    #d03b3b;
    --good-text:   #006300;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --page:      #0d0d0d;
      --surface:   #1a1a19;
      --ink:       #ffffff;
      --ink-2:     #c3c2b7;
      --muted:     #898781;
      --hairline:  #2c2c2a;
      --border:    rgba(255,255,255,0.10);
      --accent:    #3987e5;
      --good-text: #0ca30c;
    }
  }
  :root[data-theme="dark"] {
    --page: #0d0d0d; --surface: #1a1a19; --ink: #ffffff; --ink-2: #c3c2b7;
    --hairline: #2c2c2a; --border: rgba(255,255,255,0.10);
    --accent: #3987e5; --good-text: #0ca30c;
  }
  :root[data-theme="light"] {
    --page: #f9f9f7; --surface: #fcfcfb; --ink: #0b0b0b; --ink-2: #52514e;
    --hairline: #e1e0d9; --border: rgba(11,11,11,0.10);
    --accent: #2a78d6; --good-text: #006300;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--page); color: var(--ink);
    font: 15px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
    padding: 32px 24px 64px; max-width: 1100px; margin: 0 auto;
  }
  header { margin-bottom: 24px; }
  h1 { font-size: 22px; font-weight: 650; letter-spacing: -0.01em; }
  .sub { color: var(--ink-2); font-size: 13px; margin-top: 4px; }

  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin: 20px 0 24px; }
  .tile {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px;
  }
  .tile .label { font-size: 12px; color: var(--ink-2); text-transform: uppercase; letter-spacing: 0.04em; }
  .tile .value { font-size: 30px; font-weight: 650; margin-top: 2px; }
  .tile .note { font-size: 12px; color: var(--muted); }

  .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
  .chip {
    border: 1px solid var(--hairline); background: var(--surface); color: var(--ink-2);
    border-radius: 999px; padding: 4px 12px; font-size: 13px; cursor: pointer;
  }
  .chip.active { border-color: var(--accent); color: var(--ink); font-weight: 600; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px; display: flex; flex-direction: column; gap: 8px;
  }
  .card .top { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
  .card h2 { font-size: 15px; font-weight: 650; word-break: break-word; }
  .badge { font-size: 11px; color: var(--muted); border: 1px solid var(--hairline); border-radius: 4px; padding: 1px 6px; white-space: nowrap; }
  .status { font-size: 12.5px; font-weight: 600; display: inline-flex; align-items: center; gap: 5px; }
  .status.ok      { color: var(--good-text); }
  .status.warning { color: var(--ink); }
  .status.error   { color: var(--critical); }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .desc { color: var(--ink-2); font-size: 13px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .desc.empty { color: var(--critical); font-style: italic; }
  .meta { display: flex; gap: 14px; font-size: 12px; color: var(--muted); flex-wrap: wrap; margin-top: auto; }
  .meta b { color: var(--ink-2); font-weight: 600; }

  .sizebar { height: 4px; border-radius: 2px; background: var(--hairline); overflow: hidden; }
  .sizebar > i { display: block; height: 100%; background: var(--accent); border-radius: 2px; }

  details { font-size: 12.5px; }
  summary { cursor: pointer; color: var(--ink-2); }
  details li { margin-left: 16px; color: var(--ink-2); }
  details li.err { color: var(--critical); }

  .fresh-fresh { background: var(--good); }
  .fresh-aging { background: var(--warning); }
  .fresh-stale { background: var(--serious); }

  .empty-state { color: var(--muted); padding: 40px; text-align: center; }
</style>
</head>
<body>
<header>
  <h1>🛠 Skill Forge Dashboard</h1>
  <div class="sub">Generated 2026-07-09 18:15 UTC · <code>forge.py dashboard</code> to refresh</div>
</header>

<div class="tiles" id="tiles"></div>
<div class="filters" id="filters"></div>
<div class="grid" id="grid"></div>

<script>

0, "freshness": "fresh", "updated": "2026-07-09T17:26:33.949247+00:00", "dir": "/Users/marty/.claude/skills/n8n-code-javascript"}, {"name": "n8n-code-python", "source": "personal", "status": "ok", "errors": [], "warnings": [], "description": "Write Python code in n8n Code nodes. Use when writing Python in n8n, using _input/_json/_node syntax, working with standard library, or need to understand Python limitations in n8n Code nodes. Use this skill when the user specifically requests Python for an n8n Code node. Note \u2014 JavaScript is recommended for 95% of use cases \u2014 only use Python when the user explicitly prefers it or the task requires Python-specific standard library capabilities (regex, hashlib, statistics).", "words": 1593, "lines": 330, "files": 10, "age_days": 0, "freshness": "fresh", "updated": "2026-07-09T17:24:26.547544+00:00", "dir": "/Users/marty/.claude/skills/n8n-code-python"}, {"name": "n8n-expression-syntax", "source": "personal", "status": "ok", "errors": [], "warnings": [], "description": "Validate n8n expression syntax and fix common errors. Use when writing n8n expressions, using {{}} syntax, accessing $json/$node variables, troubleshooting expression errors, mapping data between nodes, or referencing webhook data in workflows. Use this skill whenever configuring node fields that reference data from previous nodes \u2014 expressions are how n8n passes data between nodes, and getting the syntax wrong is the most common source of workflow errors.", "words": 1248, "lines": 521, "files": 4, "age_days": 44, "freshness": "aging", "updated": "2026-05-25T20:36:10.870813+00:00", "dir": "/Users/marty/.claude/skills/n8n-expression-syntax"}, {"name": "n8n-mcp-tools-expert", "source": "personal", "status": "ok", "errors": [], "warnings": [], "description": "Expert guide for using n8n-mcp MCP tools effectively. Use when searching for nodes, validating configurations, accessing templates, managing workflows, managing credentials, auditing instance security, or using any n8n-mcp tool. Provides tool selection guidance, parameter formats, and common patterns. IMPORTANT \u2014 Always consult this skill before calling any n8n-mcp tool \u2014 it prevents common mistakes like wrong nodeType formats, incorrect parameter structures, and inefficient tool usage. If the user mentions n8n, workflows, nodes, or automation and you have n8n MCP tools available, use this skill first.", "words": 3543, "lines": 962, "files": 5, "age_days": 44, "freshness": "aging", "updated": "2026-05-25T20:36:10.873391+00:00", "dir": "/Users/marty/.claude/skills/n8n-mcp-tools-expert"}, {"name": "n8n-node-configuration", "source": "personal", "status": "ok", "errors": [], "warnings": [], "description": "Operation-aware node configuration guidance. Use when configuring nodes, understanding property dependencies, determining required fields, choosing between get_node detail levels, or learning common configuration patterns by node type. Always use this skill when setting up node parameters \u2014 it explains which fields are required for each operation, how displayOptions control field visibility, and when to use patchNodeField for surgical edits vs full node updates.", "words": 2259, "lines": 831, "files": 4, "age_days": 44, "freshness": "aging", "updated": "2026-05-25T20:36:10.875317+00:00", "dir": "/Users/marty/.claude/skills/n8n-node-configuration"}, {"name": "n8n-validation-expert", "source": "personal", "status": "ok", "errors": [], "warnings": [], "description": "Interpret validation errors and guide fixing them. Use when encountering validation errors, validation warnings, false positives, operator structure issues, or need help understanding validation results. Also use when asking about validation profiles, error types, the validation loop process, or auto-fix capabilities. Consult this skill whenever a validate_node or validate_workflow call returns errors or warnings \u2014 it knows which warnings are false positives and which errors need real fixes.", "words": 2332, "lines": 757, "files": 4, "age_days": 44, "freshness": "aging", "updated": "2026-05-25T20:36:10.877287+00:00", "dir": "/Users/marty/.claude/skills/n8n-validation-expert"}, {"name": "n8n-workflow-patterns", "source": "personal", "status": "ok", "errors": [], "warnings": [], "description": "Proven workflow architectural patterns from real n8n workflows. Use when building new workflows, designing workflow structure, choosing workflow patterns, planning workflow architecture, or asking about webhook processing, HTTP API integration, database operations, AI agent workflows, batch processing, or scheduled tasks. Always consult this skill when the user asks to create, build, or design an n8n workflow, automate a process, or connect services \u2014 even if they don't explicitly mention 'patterns'. Covers webhook, API, database, AI, batch processing, and scheduled automation architectures.", "words": 2251, "lines": 508, "files": 7, "age_days": 44, "freshness": "aging", "updated": "2026-05-25T20:36:10.880450+00:00", "dir": "/Users/marty/.claude/skills/n8n-workflow-patterns"}, {"name": "skill-forge", "source": "personal", "status": "ok", "errors": [], "warnings": [], "description": "Scaffold, validate, improve, package, and dashboard Claude Code skills. Use when creating a new skill, auditing or fixing existing skills, writing SKILL.md frontmatter or descriptions, packaging a skill for sharing, or generating the skill dashboard. Use whenever the user mentions skill quality, skill triggering problems, or keeping skills up to date.", "words": 496, "lines": 47, "files": 5, "age_days": 0, "freshness": "fresh", "updated": "2026-07-09T18:15:22.619743+00:00", "dir": "/Users/marty/.claude/skills/skill-forge"}, {"name": "tailscale-endpoints", "source": "project", "status": "ok", "errors": [], "warnings": [], "description": "Call self-hosted APIs across the tailnet, especially the Jetson voice AI box (Ollama LLM, voice pipeline, Piper TTS, control API). Use when a device needs to reach the Jetson's endpoints over Tailscale \u2014 voice/speak requests, remote start/stop/model-switch, OpenAI-compatible LLM calls from a laptop/Pi/phone \u2014 or when debugging an unreachable tailnet service.", "words": 532, "lines": 88, "files": 1, "age_days": 0, "freshness": "fresh", "updated": "2026-07-09T19:03:36+02:00", "dir": "/Users/marty/claude-projects/martys-claude-tools/marty-skills/skills/tailscale-endpoints"}];

const STATUS = {
  ok:      { icon: "✓", label: "healthy" },
  warning: { icon: "⚠", label: "warnings" },
  error:   { icon: "✗", label: "errors" },
};
const state = { source: "all", status: "all" };

function esc(s) { return String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }

function tiles() {
  const total = DATA.length;
  const healthy = DATA.filter(d => d.status === "ok").length;
  const warn = DATA.filter(d => d.status === "warning").length;
  const err = DATA.filter(d => d.status === "error").length;
  const stale = DATA.filter(d => d.freshness === "stale").length;
  document.getElementById("tiles").innerHTML = [
    ["Skills", total, "personal + project"],
    ["Healthy", healthy, "no issues"],
    ["Warnings", warn, "worth improving"],
    ["Errors", err, "fix these first"],
    ["Stale", stale, "> 90 days untouched"],
  ].map(([l, v, n]) => `<div class="tile"><div class="label">${l}</div><div class="value">${v}</div><div class="note">${n}</div></div>`).join("");
}

function filters() {
  const sources = ["all", ...new Set(DATA.map(d => d.source))];
  const statuses = ["all", "ok", "warning", "error"];
  document.getElementById("filters").innerHTML =
    sources.map(s => `<button class="chip ${state.source === s ? "active" : ""}" data-k="source" data-v="${s}">${s === "all" ? "all sources" : s}</button>`).join("") +
    `<span style="width:12px"></span>` +
    statuses.map(s => `<button class="chip ${state.status === s ? "active" : ""}" data-k="status" data-v="${s}">${s === "all" ? "all statuses" : (STATUS[s]?.label ?? s)}</button>`).join("");
  document.querySelectorAll(".chip").forEach(c =>
    c.onclick = () => { state[c.dataset.k] = c.dataset.v; render(); });
}

function grid() {
  const rows = DATA.filter(d =>
    (state.source === "all" || d.source === state.source) &&
    (state.status === "all" || d.status === state.status));
  const maxWords = Math.max(1, ...DATA.map(d => d.words || 0));
  const el = document.getElementById("grid");
  if (!rows.length) { el.innerHTML = `<div class="empty-state">No skills match the current filters.</div>`; return; }
  el.innerHTML = rows.map(d => {
    const st = STATUS[d.status] ?? STATUS.warning;
    const issues = [...d.errors.map(e => `<li class="err">✗ ${esc(e)}</li>`),
                    ...d.warnings.map(w => `<li>⚠ ${esc(w)}</li>`)].join("");
    const desc = d.description
      ? `<div class="desc" title="${esc(d.description)}">${esc(d.description)}</div>`
      : `<div class="desc empty">no description — this skill can never auto-trigger</div>`;
    return `<div class="card">
      <div class="top"><h2>${esc(d.name)}</h2><span class="badge">${esc(d.source)}</span></div>
      <span class="status ${d.status}">${st.icon} ${st.label}</span>
      ${desc}
      <div class="sizebar" title="${d.words} words"><i style="width:${Math.round(100 * (d.words || 0) / maxWords)}%"></i></div>
      <div class="meta">
        <span><b>${d.words}</b> words</span>
        <span><b>${d.files}</b> files</span>
        <span><span class="dot fresh-${esc(d.freshness)}"></span> updated <b>${d.age_days ?? "?"}d</b> ago</span>
      </div>
      ${issues ? `<details><summary>${d.errors.length + d.warnings.length} issue(s)</summary><ul>${issues}</ul></details>` : ""}
    </div>`;
  }).join("");
}

function render() { tiles(); filters(); grid(); }
render();
</script>
